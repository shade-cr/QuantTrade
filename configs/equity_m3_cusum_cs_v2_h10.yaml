# Recorded trial 2026-07-04 (B0014): horizon 40->10 + re-derived geometry tp 1.5 (was 3.0,
# unreachable in 10 bars per DA tick-3 objection). Only these + output_dir differ from
# equity_m3_cusum_cs_v2.yaml. Motivation: effective-N horizon curve (654@h40 -> 905@h10)
# - first config that honestly clears the 799 pre-flight floor.
asset_class: equity
universe_path: configs/universe_equity_m3.yaml
universe_segment: stocks
date_range:
  start: '2006-01-01'
  end: '2026-04-30'
triple_barrier:
  horizon: 10
  tp_atr_mult: 1.5
  sl_atr_mult: 1.0
  atr_period: 14
primary:
  candidates:
  - cusum_filter
  cusum_filter:
    threshold_atr: 2.0
features:
  tier: 2
  gld_volume: false
  cross_sectional: true
walk_forward:
  n_folds: 4
  train_min_bars: 1500
  purge_bars: 20
  embargo_pct: 0.01
models:
- xgb
- lgbm
- rf
- lr
hyperparam_search:
  method: random
  n_iter: 20
  cv_splits: 3
  cv_type: purged_time_series
  cv_purge_bars: 20
calibration:
  method: sigmoid
  cv: prefit
  calib_holdout_pct: 0.15
  min_minority_for_isotonic: 50
stacking:
  baseline: trade_all_primary
  min_models_beating_baseline: 2
  min_folds_beating_baseline: 3
  max_oof_corr: 0.7
  min_trades_per_fold: 30
  meta_learner: logistic_regression
  meta_C: 1.0
  meta_penalty: l2
  meta_n_folds: 4
best_model:
  min_trades_per_fold: 30
  min_folds_with_trades: 2
metrics:
  cost_per_trade_bps: 10
  bars_per_year: 252
  threshold_grid:
  - 0.5
  - 0.52
  - 0.54
  - 0.56
  - 0.58
  - 0.6
  - 0.62
  threshold_selection: inner_cv
threshold_selection:
  method: inner_cv
  inner_splits: 3
  min_trades_per_inner_fold: 20
meta_pooling:
  scope: within_class
  schema: core
  weight_balance: per_class
  pooled_uniqueness: true
  train_min_frac: 0.5
  fit_weight: corr_discounted_v2
output_dir: results/clf_equity_m3_cusum_cs_v2_h10
random_seed: 42
dry_run:
  enabled_via_cli_flag: true
  n_iter: 5
  max_minutes_per_model_warn: 8
  max_minutes_per_model_abort: 15
