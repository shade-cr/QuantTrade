asset: XAUUSD
timeframe: D1
data_path: data/D1/ABT_D1.csv
date_range:
  start: '2006-01-01'
  end: '2026-04-30'
triple_barrier:
  horizon: 40
  tp_atr_mult: 2.5
  sl_atr_mult: 1.0
  atr_period: 14
primary:
  candidates:
  - cusum_filter
  ema_cross:
    fast: 20
    slow: 50
    dead_zone_atr: 0.25
  momentum_zscore:
    lookback: 20
    threshold: 0.2
  cusum_filter:
    threshold_atr: 2.0
features:
  tier: 2
  gld_volume: false
walk_forward:
  n_folds: 3
  train_min_bars: 1500
  purge_bars: 40
  embargo_pct: 0.01
models:
- xgb
- catboost
- rf
hyperparam_search:
  method: random
  n_iter: 20
  cv_splits: 3
  cv_type: purged_time_series
  cv_purge_bars: 40
calibration:
  method: sigmoid
  cv: prefit
  calib_holdout_pct: 0.3
  min_minority_for_isotonic: 50
stacking:
  baseline: trade_all_primary
  min_models_beating_baseline: 2
  min_folds_beating_baseline: 3
  max_oof_corr: 0.7
  min_trades_per_fold: 30
  meta_learner: logistic_regression
  meta_C: 1.0
  meta_penalty: l2
  meta_n_folds: 4
metrics:
  cost_per_trade_bps: 10
  bars_per_year: 252
  threshold_grid:
  - 0.364285714286
  - 0.414285714286
  - 0.464285714286
  - 0.514285714286
  threshold_selection: inner_cv
  audit_effective_threshold: 0.3642857142857143
threshold_selection:
  method: inner_cv
  inner_splits: 3
  min_trades_per_inner_fold: 20
output_dir: results\phase5\20260703-ABT-D1-BULL_QUI-T002D1
random_seed: 42
dry_run:
  enabled_via_cli_flag: true
  n_iter: 5
  max_minutes_per_model_warn: 8
  max_minutes_per_model_abort: 15
regime_mask_path: D:\PROJECTS\QuantTrade\phase5\runtime\regime_masks\20260703-ABT-D1-BULL_QUI-T002D1.parquet
primary_feature_blacklist: []
feature_overrides_add:
- cs_spread_21
- vix_chg_5
- real_yield_5y_z252d
- volume
feature_overrides_drop: []
