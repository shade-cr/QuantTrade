asset_class: equity
universe_path: configs/universe_equity_m3.yaml
universe_segment: stocks
date_range:
  start: '2006-01-01'
  end: '2026-04-30'
triple_barrier:
  horizon: 10
  tp_atr_mult: 1.5
  sl_atr_mult: 1.5
  atr_period: 14
primary:
  candidates:
  - bollinger_meanrev
  ema_cross:
    fast: 20
    slow: 50
    dead_zone_atr: 0.25
  momentum_zscore:
    lookback: 20
    threshold: 0.3
  bollinger_meanrev:
    period: 21
    k_stdev: 2.0
features:
  tier: 2
  gld_volume: false
  cross_sectional: true
walk_forward:
  n_folds: 4
  train_min_bars: 1500
  purge_bars: 20
  embargo_pct: 0.01
models:
- xgb
- lgbm
- rf
- lr
hyperparam_search:
  method: random
  n_iter: 20
  cv_splits: 3
  cv_type: purged_time_series
  cv_purge_bars: 20
calibration:
  method: sigmoid
  cv: prefit
  calib_holdout_pct: 0.15
  min_minority_for_isotonic: 50
stacking:
  baseline: trade_all_primary
  min_models_beating_baseline: 2
  min_folds_beating_baseline: 3
  max_oof_corr: 0.7
  min_trades_per_fold: 30
  meta_learner: logistic_regression
  meta_C: 1.0
  meta_penalty: l2
  meta_n_folds: 4
best_model:
  min_trades_per_fold: 30
  min_folds_with_trades: 2
metrics:
  cost_per_trade_bps: 10
  bars_per_year: 252
  threshold_grid:
  - 0.5
  - 0.52
  - 0.54
  - 0.56
  - 0.58
  - 0.6
  - 0.62
  threshold_selection: inner_cv
  audit_effective_threshold: 0.5833333333333334
threshold_selection:
  method: fixed_ev
  inner_splits: 3
  min_trades_per_inner_fold: 20
meta_pooling:
  scope: within_class
  schema: core
  weight_balance: per_class
  pooled_uniqueness: true
  train_min_frac: 0.5
output_dir: results\phase5_pooled\20260704-AIG-D1-BEAR_QUI-T005
random_seed: 42
dry_run:
  enabled_via_cli_flag: true
  n_iter: 5
  max_minutes_per_model_warn: 8
  max_minutes_per_model_abort: 15
regime_scope:
- BEAR_QUIET
regime_gate_mode: filter_events
feature_overrides_add:
- us_5y2y_z252
- cs_spread_21
- vix_chg_5
- real_yield_5y_z252d
- volume
feature_overrides_drop: []
